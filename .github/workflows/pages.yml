name: Refresh and deploy co-author graph

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      record_heartbeat:
        description: "Record a heartbeat commit before rebuilding"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 6 * * 1"
      timezone: "Europe/Oslo"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Record scheduled workflow heartbeat
        if: github.event_name == 'schedule' || inputs.record_heartbeat
        run: python3 automation/update_heartbeat.py automation/heartbeat.json

      - name: Commit scheduled workflow heartbeat
        if: github.event_name == 'schedule' || inputs.record_heartbeat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/heartbeat.json
          git commit -m "chore: record scheduled refresh [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip ".[test]"

      - name: Test graph generator
        run: |
          python -m pytest
          python -m ruff check src tests automation
          python -m ruff format --check src tests automation

      - name: Generate graph data from DBLP
        run: python -m coauthors_graph --config config.json --output web/public/data/graph.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Test frontend
        working-directory: web
        run: npm test

      - name: Build static website
        working-directory: web
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
