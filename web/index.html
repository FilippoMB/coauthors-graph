<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An interactive map of Filippo Maria Bianchi's research collaborations."
    />
    <meta name="theme-color" content="#07111f" />
    <title>Filippo Maria Bianchi · Co-author network</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="identity">
          <p class="eyebrow">Research network</p>
          <h1 id="page-title">Co-author graph</h1>
          <p id="graph-summary" class="summary" aria-live="polite">
            Loading collaboration data…
          </p>
        </div>
        <div class="toolbar" aria-label="Graph controls">
          <span id="updated-at" class="updated-at"></span>
          <button id="fit-button" class="icon-button" type="button" aria-label="Fit graph to screen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5" />
            </svg>
          </button>
          <button id="theme-button" class="icon-button theme-button" type="button" aria-label="Switch color theme">
            <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3.5" />
              <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 15.1A8.2 8.2 0 0 1 8.9 4a8.2 8.2 0 1 0 11.1 11.1Z" />
            </svg>
          </button>
        </div>
      </header>

      <main class="graph-stage">
        <div id="cy" role="application" aria-label="Interactive co-author network"></div>
        <div id="loading" class="loading-card" role="status">
          <span class="loading-mark" aria-hidden="true"></span>
          <span>Assembling the network</span>
        </div>
        <div id="error" class="error-card" role="alert" hidden>
          <p class="error-title">The network could not be loaded.</p>
          <p id="error-message">Try refreshing the page in a moment.</p>
        </div>
        <div id="tooltip" class="tooltip" role="tooltip" hidden>
          <strong id="tooltip-name"></strong>
          <span id="tooltip-count"></span>
        </div>
      </main>

      <div class="visual-key" aria-label="Visual encoding key">
        <span><i class="key-dot"></i> Color groups communities</span>
        <span><i class="key-size"></i> Size shows shared papers</span>
      </div>

      <aside id="details" class="details" aria-labelledby="details-name" aria-hidden="true">
        <button id="details-close" class="details-close" type="button" aria-label="Close author details">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18" /></svg>
        </button>
        <p class="eyebrow">Selected author</p>
        <h2 id="details-name"></h2>
        <p id="details-summary" class="details-summary"></p>
        <div class="details-rule"></div>
        <h3>Shared publications</h3>
        <ol id="publication-list" class="publication-list"></ol>
      </aside>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
